<!doctype html>
<html lang="en" class="dark bg-main">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tungsten</title>

  <script>
    (function () {
      var VALID = ['cyberpunk', 'dark', 'light', 'neon'];
      var saved = localStorage.getItem('app-theme');
      var theme = VALID.includes(saved) ? saved : 'cyberpunk';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>

<body class="bg-main text-foreground">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
